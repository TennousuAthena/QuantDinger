# QuantDinger Development Docker Compose
# Hot reload enabled for both frontend and backend
# Usage: docker-compose -f docker-compose.dev.yml up

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: quantdinger-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantdinger}
      POSTGRES_USER: ${POSTGRES_USER:-quantdinger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantdinger123}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend_api_python/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./backend_api_python/migrations:/migrations
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - quantdinger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantdinger -d quantdinger"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service (Development with hot reload)
  backend:
    build:
      context: ./backend_api_python
      dockerfile: Dockerfile.dev
    container_name: quantdinger-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      # Mount source code for hot reload
      - ./backend_api_python/app:/app/app:ro
      - ./backend_api_python/run.py:/app/run.py:ro
      # Persistent data directories
      - ./backend_api_python/logs:/app/logs
      - ./backend_api_python/data:/app/data
      # Configuration file
      - ./backend_api_python/.env:/app/.env:ro
    environment:
      - PYTHON_API_HOST=0.0.0.0
      - PYTHON_API_PORT=5000
      - PYTHON_API_DEBUG=true
      - TZ=Asia/Shanghai
      # Database connection
      - DATABASE_URL=postgresql://${POSTGRES_USER:-quantdinger}:${POSTGRES_PASSWORD:-quantdinger123}@postgres:5432/${POSTGRES_DB:-quantdinger}
      - DB_TYPE=postgresql
    networks:
      - quantdinger-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Web Service (Development with hot reload)
  frontend:
    build:
      context: ./quantdinger_vue
      dockerfile: Dockerfile.dev
    container_name: quantdinger-frontend-dev
    restart: unless-stopped
    ports:
      - "8888:8000"
    volumes:
      # Mount source code for hot reload
      - ./quantdinger_vue/src:/app/src:ro
      - ./quantdinger_vue/public:/app/public:ro
      - ./quantdinger_vue/config:/app/config:ro
      - ./quantdinger_vue/vue.config.js:/app/vue.config.js:ro
      - ./quantdinger_vue/babel.config.js:/app/babel.config.js:ro
      - ./quantdinger_vue/.env:/app/.env:ro
      - ./quantdinger_vue/.env.development:/app/.env.development:ro
      # Exclude node_modules from mount (use container's installed modules)
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DOCKER_ENV=true
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    networks:
      - quantdinger-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data_dev:
    driver: local

networks:
  quantdinger-network:
    driver: bridge
